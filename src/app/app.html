<app-student-form
  [student] = "selectedStudent"
  (studentAdded)="addStudent($event)"
  (studentUpdated)="updateStudent($event)">  // const $event = student; addStudent($event)
</app-student-form>

<hr>

<h2>Student List</h2>

<table border="1">

  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Department</th>
    <th>Email</th>
    <th>Action</th>
  </tr>

  <tr *ngFor="let student of students; let i = index">

    <td>{{ student.name }}</td>

    <td>{{ student.age }}</td>

    <td>{{ student.department }}</td>

    <td>{{ student.email }}</td>

    <td>
        <button (click)="editStudent(student, i)">
            Edit
        </button>

        <button (click)="deleteStudent(student)">
            Delete
        </button>
    </td>

  </tr>

</table>
